; PHP runtime configuration for GestConv+ (Windows / FrankenPHP)
extension_dir = ext

extension = openssl
extension = intl
extension = pdo_sqlite
extension = sqlite3
extension = mbstring
extension = zip

; Los formularios de adjuntos (actividades y tareas de sanción) admiten varios
; ficheros de hasta 10 MB cada uno sin límite de cantidad: post_max_size debe
; cubrir la suma, no solo un fichero (si se supera, PHP descarta todo el
; cuerpo de la petición, token CSRF incluido). Sin esto, PHP usa sus valores
; por defecto (2M/8M), muy por debajo del límite por fichero de la aplicación.
upload_max_filesize = 16M
post_max_size        = 64M
