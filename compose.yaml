# yaml-language-server: $schema=vendor/symfony/dependency-injection/Loader/schema/services.schema.json
###> gestconv-plus production stack ################################################
# Variables de entorno: copia .env.example a .env.local, ajusta los valores e
# indica a Docker Compose que use ese fichero (no se versiona). Exporta una
# vez por sesión:
#
#   export COMPOSE_ENV_FILES=.env.local
#
# (alternativamente, añade --env-file .env.local a cada comando docker compose).
#
# Uso:
#   Producción  →  docker compose up -d
#   Desarrollo  →  docker compose -f compose.yaml -f compose.dev.yaml up -d
#                  (solo la base de datos; PHP se sirve con Symfony CLI)
##############################################################################

# Entorno compartido por la aplicación y el worker (mismo código, misma BD).
x-app-environment: &app-environment
  APP_ENV:                      prod
  APP_DEBUG:                    "0"
  APP_SECRET:                   "${APP_SECRET:?Crea un .env con APP_SECRET definido}"
  DATABASE_URL:                 "postgresql://gestconv:${DB_PASSWORD:-changeme}@database:5432/gestconv?serverVersion=16&charset=utf8"
  DEFAULT_URI:                  "${DEFAULT_URI:-http://localhost}"
  MIGRATIONS_PATH:              migrations/postgresql
  APP_LOG:                      "${APP_LOG:-true}"
  APP_EXTERNAL_ENABLED:         "${APP_EXTERNAL_ENABLED:-true}"
  APP_EXTERNAL_URL:             "${APP_EXTERNAL_URL:-https://seneca.juntadeandalucia.es/seneca/jsp/ComprobarUsuarioExt.jsp}"
  APP_EXTERNAL_URL_FORCE_SECURITY: "${APP_EXTERNAL_URL_FORCE_SECURITY:-true}"

services:

  # ── Aplicación (FrankenPHP) ───────────────────────────────────────────────
  app:
    image: reasoledu/gestconv-plus:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:443/udp"
    environment:
      <<: *app-environment
      SERVER_NAME:                  "${SERVER_NAME:-:80}"
      LOAD_FIXTURES:                "${LOAD_FIXTURES:-false}"
    volumes:
      # Datos persistentes de Symfony (caché, logs, sesiones) → ./data/var
      - ./data/var:/app/var
    depends_on:
      database:
        condition: service_healthy

  # ── Worker de mensajería (envío asíncrono de emails) ──────────────────────
  # FrankenPHP es monoproceso, así que el envío de correos encolados (verificación
  # de email, notificaciones de tutoría/firma) lo procesa este contenedor aparte.
  # No ejecuta el entrypoint (migraciones/setup las hace «app»); espera a que «app»
  # las aplique y, si arranca antes, «restart» lo reintenta.
  worker:
    image: reasoledu/gestconv-plus:latest
    restart: unless-stopped
    environment:
      <<: *app-environment
    entrypoint: ["php"]
    command: ["bin/console", "messenger:consume", "async", "scheduler_default", "--time-limit=3600", "--memory-limit=128M"]
    volumes:
      - ./data/var:/app/var
    depends_on:
      database:
        condition: service_healthy
      app:
        condition: service_started

  # ── Base de datos (PostgreSQL) ────────────────────────────────────────────
  database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       gestconv
      POSTGRES_USER:     gestconv
      POSTGRES_PASSWORD: "${DB_PASSWORD:-changeme}"
    volumes:
      # Datos persistentes de PostgreSQL → ./data/postgres
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "gestconv", "-U", "gestconv"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
