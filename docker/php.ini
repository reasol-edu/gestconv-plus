; ── OPcache ────────────────────────────────────────────────────────────────
opcache.enable                 = 1
opcache.enable_cli             = 0
opcache.memory_consumption     = 256
opcache.max_accelerated_files  = 20000
; Sin recarga automática en producción (cambiar a 1 durante desarrollo)
opcache.validate_timestamps    = 0
realpath_cache_size            = 4096K
realpath_cache_ttl             = 600

; ── Límites ────────────────────────────────────────────────────────────────
memory_limit          = 256M
upload_max_filesize   = 16M
; Los formularios de adjuntos (actividades y tareas de sanción) admiten
; varios ficheros de hasta 10 MB cada uno sin límite de cantidad: post_max_size
; debe cubrir la suma, no solo un fichero (si se supera, PHP descarta todo el
; cuerpo de la petición, token CSRF incluido).
post_max_size         = 64M
max_execution_time    = 60

; ── Errores (producción) ───────────────────────────────────────────────────
display_errors  = Off
log_errors      = On
