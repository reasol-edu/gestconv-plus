site_name: Manual de usuario de GestConv+
site_description: Gestión de la convivencia
site_url: https://reasol-edu.github.io/gestconv-plus/
# Versión y fecha del release en el pie de la web. Fuente única: config/services.yaml.
# El target "docs-web" del Makefile exporta MANUAL_COPYRIGHT con app.version y
# app.pub_date; al construir directamente con mkdocs (sin la variable) se usa el valor por defecto.
copyright: !ENV [MANUAL_COPYRIGHT, "Manual de usuario de GestConv+"]
docs_dir: .
site_dir: ../manual-site
use_directory_urls: false
repo_url: https://github.com/reasol-edu/gestconv-plus

exclude_docs: |
  README.md
  requirements.txt
  _build.html
  *.pdf

theme:
  name: material
  language: es
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    primary: deep purple
    accent: deep purple
  icon:
      repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - toc.integrate

extra_css:
  - assets/theme.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - attr_list
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Introducción: index.md
  - Instalación y puesta en marcha: 01-instalacion-y-puesta-en-marcha.md
  - Preparar el curso académico: 02-preparar-el-curso-academico.md
  - El trabajo diario del profesorado: 03-el-trabajo-diario.md
  - Sanciones y comisión de convivencia: 04-sanciones-y-comision.md
  - Calendario y tablón: 05-calendario-y-tablon.md
  - Administrar el centro educativo: 06-administrar-el-centro.md
  - Administrar la plataforma: 07-administrar-la-plataforma.md
  - Permisos de un vistazo: 08-permisos-de-un-vistazo.md
  - 'Anexo: Resolución de problemas': 09-resolucion-de-problemas.md
  - 'Anexo: Glosario': 10-glosario.md
