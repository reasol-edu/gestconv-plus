site_name: Manual de usuario de GestConv+
site_description: Gestión de la planificación y asignación de las estancias del alumnado en empresas de la FFEOE
site_url: https://reasol-edu.github.io/gestconv-plus/
# Versión y fecha del release en el pie de la web. Fuente única: config/services.yaml.
# El target "docs-web" del Makefile exporta MANUAL_COPYRIGHT con app.version y
# app.pub_date; al construir directamente con mkdocs (sin la variable) se usa el valor por defecto.
copyright: !ENV [MANUAL_COPYRIGHT, "Manual de usuario de GestConv+"]
docs_dir: .
site_dir: ../manual-site
use_directory_urls: false
repo_url: https://github.com/reasol-edu/gestconv-plus

exclude_docs: |
  README.md
  requirements.txt
  _build.html
  *.pdf

theme:
  name: material
  language: es
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    primary: deep purple
    accent: deep purple
  icon:
      repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - toc.integrate

extra_css:
  - assets/theme.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - attr_list
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Introducción: index.md
  - Instalación y requisitos: 01-instalacion-y-requisitos.md
  - Primeros pasos: 02-primeros-pasos.md
  - Roles y permisos: 03-roles-y-permisos.md
  - Flujo de trabajo: 04-flujo-de-trabajo.md
  - Secciones de la aplicación: 05-secciones-de-la-aplicacion.md
  - Notificaciones por email: 06-notificaciones-y-email.md
  - Ajustes: 07-ajustes.md
  - Comandos de consola: 08-comandos-de-consola.md
  - Despliegue: 09-despliegue.md
  - Operación y mantenimiento: 10-operacion-y-mantenimiento.md
  - Resolución de problemas: 11-resolucion-de-problemas.md
  - Glosario: 12-glosario.md
