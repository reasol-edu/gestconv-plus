<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#2f4b26;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#3e885b;stop-opacity:1" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#2f4b26" flood-opacity="0.3"/>
        </filter>
    </defs>

    <!-- Fondo cuadrado redondeado -->
    <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)" filter="url(#shadow)"/>

    <!-- Elemento decorativo de fondo -->
    <circle cx="256" cy="256" r="160" fill="#85bda6" opacity="0.15"/>

    <!-- Forma de calendario/portapapeles -->
    <rect x="136" y="120" width="240" height="272" rx="24" ry="24" fill="#bedcfe"/>

    <!-- Anillas superiores del calendario -->
    <rect x="176" y="96" width="24" height="48" rx="12" ry="12" fill="#c0d7bb"/>
    <rect x="312" y="96" width="24" height="48" rx="12" ry="12" fill="#c0d7bb"/>

    <!-- Líneas de contenido (simulando lista/convocatorias) -->
    <rect x="168" y="192" width="176" height="16" rx="8" ry="8" fill="#3e885b" opacity="0.8"/>
    <rect x="168" y="232" width="128" height="16" rx="8" ry="8" fill="#85bda6" opacity="0.9"/>
    <rect x="168" y="272" width="160" height="16" rx="8" ry="8" fill="#85bda6" opacity="0.6"/>

    <!-- Símbolo "+" integrado en la esquina inferior derecha -->
    <circle cx="340" cy="340" r="44" fill="#2f4b26"/>
    <path d="M340 316 L340 364 M316 340 L364 340" stroke="#bedcfe" stroke-width="12" stroke-linecap="round"/>

    <!-- Detalle sutil de acento -->
    <rect x="136" y="160" width="240" height="8" rx="4" ry="4" fill="#3e885b" opacity="0.3"/>
</svg>
