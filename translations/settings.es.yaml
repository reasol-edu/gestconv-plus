settings.key.reports_guard_duty_header_left.label: 'Encabezado de profesorado de guardia (izquierda)'
settings.key.reports_guard_duty_header_left.description: 'Contenido alineado a la izquierda del encabezado de cada página del PDF de profesorado de guardia. Admite marcadores de sustitución (consulta la lista completa con el icono de información).'

settings.key.reports_guard_duty_header_right.label: 'Encabezado de profesorado de guardia (derecha)'
