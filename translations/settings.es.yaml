# ── Definiciones de ajustes ───────────────────────────────────────────────────
settings.key.page_size.label: 'Resultados por página'
settings.key.page_size.description: 'Número de elementos que se muestran en los listados.'

settings.key.email_notifications.label: 'Activar notificaciones automáticas'
settings.key.email_notifications.description: 'Activa o desactiva todos los correos automáticos de la aplicación.'

settings.key.email_notification_tutor_assigned.label: 'Correo al asignar tutoría docente'
settings.key.email_notification_tutor_assigned.description: 'Envía un aviso al tutor o tutora dual docente cuando se le asigna un puesto.'

settings.key.email_notification_positions_created.label: 'Correo al crear puestos en una estancia'
settings.key.email_notification_positions_created.description: 'Notifica a los docentes de enlace de la empresa cuando se crean puestos nuevos.'

settings.key.email_notification_signature_reminder.label: 'Correo de recordatorio de firma'
settings.key.email_notification_signature_reminder.description: 'Recuerda a quienes tienen responsabilidad sobre el puesto (tutor o tutora dual docente, coordinación de FP dual y jefatura de familia profesional) los puestos registrados sin firmar cuando la estancia está próxima a comenzar.'

settings.key.email_notification_signature_reminder_days.label: 'Días de antelación del recordatorio de firma'
settings.key.email_notification_signature_reminder_days.description: 'Días antes del inicio de la estancia a partir de los cuales se empieza a enviar el recordatorio diario de los puestos registrados sin firmar.'

settings.key.board_current_week_seconds.label: 'Duración de la semana actual'
settings.key.board_current_week_seconds.description: 'Segundos que se muestra la semana actual antes de pasar a la semana siguiente (0-3600). Un valor de 0 en este ajuste o en "Duración de la semana siguiente" desactiva la visualización de la semana siguiente.'

settings.key.board_next_week_seconds.label: 'Duración de la semana siguiente'
settings.key.board_next_week_seconds.description: 'Segundos que se muestra la semana siguiente antes de volver a la semana actual (0-3600). Un valor de 0 en este ajuste o en "Duración de la semana actual" desactiva la visualización de la semana siguiente.'

settings.key.board_theme.label: 'Tema del modo tablón'
settings.key.board_theme.description: 'Combinación de colores del modo tablón: claro, oscuro, o según la preferencia del navegador o sistema operativo del dispositivo que lo muestra.'
settings.key.board_theme.choice.light: 'Claro'
settings.key.board_theme.choice.dark: 'Oscuro'
settings.key.board_theme.choice.system: 'Según el sistema'

settings.key.notifications_report_notifier.label: 'Quién notifica los partes de convivencia'
settings.key.notifications_report_notifier.description: 'Determina qué docentes pueden registrar la comunicación con la familia de un parte, además de la administración.'
settings.key.notifications_report_notifier.choice.report_teacher: 'El docente del parte'
settings.key.notifications_report_notifier.choice.group_tutor: 'El tutor/a de grupo'
settings.key.notifications_report_notifier.choice.both: 'Ambos'

settings.key.notifications_sanction_notifier.label: 'Quién notifica las sanciones'
settings.key.notifications_sanction_notifier.description: 'Determina qué docentes pueden registrar la comunicación con la familia de una sanción, además de la administración.'
settings.key.notifications_sanction_notifier.choice.report_teacher: 'El docente de la sanción'
settings.key.notifications_sanction_notifier.choice.group_tutor: 'El tutor/a de grupo'
settings.key.notifications_sanction_notifier.choice.both: 'Ambos'

settings.key.notifications_report_auto_prescribe_days.label: 'Días para la prescripción automática'
settings.key.notifications_report_auto_prescribe_days.description: 'Días transcurridos desde que ocurrió el incidente a partir de los cuales un parte sin notificar a la familia prescribe automáticamente. Un valor de 0 desactiva la prescripción automática.'

settings.key.notifications_report_prescription_warning_days.label: 'Aviso de prescripción próxima'
settings.key.notifications_report_prescription_warning_days.description: 'Días de antelación con los que se avisa por correo de que un parte sin notificar prescribirá automáticamente. Un valor de 0 desactiva este aviso.'

settings.key.notifications_email_log_enabled.label: 'Registrar los avisos por correo'
settings.key.notifications_email_log_enabled.description: 'Guarda un registro de cada aviso por correo enviado sobre partes y sanciones (destinatario, tipo de evento, asunto y resultado), visible en el hub de centro educativo.'

settings.key.notifications_log_retention_days.label: 'Retención de los registros'
settings.key.notifications_log_retention_days.description: 'Días que se conservan las entradas del registro de actividad y del registro de avisos por correo antes de eliminarse automáticamente. Un valor de 0 desactiva esta eliminación automática.'

settings.key.notifications_email_report_created.label: 'Parte registrado'
settings.key.notifications_email_report_created.description: 'Determina quién recibe un correo cuando se registra un nuevo parte de convivencia.'
settings.key.notifications_email_report_created.choice.none: 'A nadie'
settings.key.notifications_email_report_created.choice.report_teacher: 'Al docente que lo registra'
settings.key.notifications_email_report_created.choice.group_tutor: 'Al tutor/a de grupo'
settings.key.notifications_email_report_created.choice.both: 'A ambos'

settings.key.notifications_email_report_notified.label: 'Parte notificado a la familia'
settings.key.notifications_email_report_notified.description: 'Determina quién recibe un correo cuando se registra una comunicación con la familia sobre un parte.'
settings.key.notifications_email_report_notified.choice.none: 'A nadie'
settings.key.notifications_email_report_notified.choice.report_teacher: 'Al docente que lo registró'
settings.key.notifications_email_report_notified.choice.group_tutor: 'Al tutor/a de grupo'
settings.key.notifications_email_report_notified.choice.both: 'A ambos'

settings.key.notifications_email_report_modified.label: 'Parte modificado'
settings.key.notifications_email_report_modified.description: 'Determina quién recibe un correo cuando se edita un parte ya registrado (no incluye marcarlo como prescrito, que tiene su propio aviso).'
settings.key.notifications_email_report_modified.choice.none: 'A nadie'
settings.key.notifications_email_report_modified.choice.report_teacher: 'Al docente que lo registró'
settings.key.notifications_email_report_modified.choice.group_tutor: 'Al tutor/a de grupo'
settings.key.notifications_email_report_modified.choice.both: 'A ambos'

settings.key.notifications_email_report_deleted.label: 'Parte eliminado'
settings.key.notifications_email_report_deleted.description: 'Determina quién recibe un correo cuando se elimina un parte.'
settings.key.notifications_email_report_deleted.choice.none: 'A nadie'
settings.key.notifications_email_report_deleted.choice.report_teacher: 'Al docente que lo registró'
settings.key.notifications_email_report_deleted.choice.group_tutor: 'Al tutor/a de grupo'
settings.key.notifications_email_report_deleted.choice.both: 'A ambos'

settings.key.notifications_email_report_prescribed.label: 'Parte prescrito'
settings.key.notifications_email_report_prescribed.description: 'Determina quién recibe un correo cuando un administrador marca un parte como prescrito.'
settings.key.notifications_email_report_prescribed.choice.none: 'A nadie'
settings.key.notifications_email_report_prescribed.choice.report_teacher: 'Al docente que lo registró'
settings.key.notifications_email_report_prescribed.choice.group_tutor: 'Al tutor/a de grupo'
settings.key.notifications_email_report_prescribed.choice.both: 'A ambos'

settings.key.notifications_email_report_sanctioned.label: 'Parte incorporado a una sanción'
settings.key.notifications_email_report_sanctioned.description: 'Determina quién recibe un correo cuando un parte se incorpora a una sanción.'
settings.key.notifications_email_report_sanctioned.choice.none: 'A nadie'
settings.key.notifications_email_report_sanctioned.choice.report_teacher: 'Al docente que lo registró'
settings.key.notifications_email_report_sanctioned.choice.group_tutor: 'Al tutor/a de grupo'
settings.key.notifications_email_report_sanctioned.choice.both: 'A ambos'

settings.key.notifications_email_sanction_notified.label: 'Sanción notificada a la familia'
settings.key.notifications_email_sanction_notified.description: 'Determina quién recibe un correo cuando se registra una comunicación con la familia sobre una sanción. Se avisa al docente que registró cada parte incorporado y/o al tutor/a del grupo.'
settings.key.notifications_email_sanction_notified.choice.none: 'A nadie'
settings.key.notifications_email_sanction_notified.choice.report_teacher: 'A los docentes de los partes'
settings.key.notifications_email_sanction_notified.choice.group_tutor: 'Al tutor/a de grupo'
settings.key.notifications_email_sanction_notified.choice.both: 'A ambos'

settings.key.notifications_email_report_sanctionable_committee.label: 'Parte sancionable (comisión de convivencia)'
settings.key.notifications_email_report_sanctionable_committee.description: 'Determina si la comisión de convivencia recibe un correo cuando un parte queda notificado a la familia y puede ser sancionado (no prescrito y sin sanción todavía).'
settings.key.notifications_email_report_sanctionable_committee.choice.none: 'A nadie'
settings.key.notifications_email_report_sanctionable_committee.choice.committee: 'A la comisión de convivencia'

settings.key.notifications_email_report_attach_pdf.label: 'Enviar parte adjunto al correo'
settings.key.notifications_email_report_attach_pdf.description: 'Adjunta el PDF del parte a cualquier aviso por correo sobre ese parte (registrado, notificado, modificado, eliminado, prescrito o incorporado a una sanción). No afecta al registro de avisos.'

settings.key.notifications_email_sanction_attach_pdf.label: 'Enviar sanción adjunta al correo'
settings.key.notifications_email_sanction_attach_pdf.description: 'Adjunta el PDF de la sanción al aviso por correo de sanción notificada a la familia. No afecta al registro de avisos.'

settings.key.reports_incident_header_left.label: 'Encabezado de informe de partes (izquierda)'
settings.key.reports_incident_header_left.description: 'Contenido alineado a la izquierda del encabezado de cada página del PDF de un parte. Admite marcadores de sustitución (consulta la lista completa con el icono de información).'

settings.key.reports_incident_header_right.label: 'Encabezado de informe de partes (derecha)'
settings.key.reports_incident_header_right.description: 'Contenido alineado a la derecha del encabezado, en la misma línea que el izquierdo. Admite marcadores de sustitución (consulta la lista completa con el icono de información).'

settings.key.reports_incident_header_margin.label: 'Margen para encabezado de partes'
settings.key.reports_incident_header_margin.description: 'Milímetros reservados en la parte superior de cada página para el encabezado; el contenido del informe empieza tras este margen. Auméntalo si el encabezado tiene varias líneas.'

settings.key.reports_incident_footer.label: 'Pie de contenido de informe de partes'
settings.key.reports_incident_footer.description: 'Texto que se añade al final del contenido del PDF de un parte, una sola vez (no se repite en cada página). Admite marcadores de sustitución (consulta la lista completa con el icono de información). Si no se personaliza, se usa por defecto «En {city} a {current_day} de {current_month_name} de {current_year}».'

settings.key.reports_sanction_header_left.label: 'Encabezado de informe de sanciones (izquierda)'
settings.key.reports_sanction_header_left.description: 'Contenido alineado a la izquierda del encabezado de cada página del PDF de una sanción. Admite marcadores de sustitución (consulta la lista completa con el icono de información).'

settings.key.reports_sanction_header_right.label: 'Encabezado de informe de sanciones (derecha)'
settings.key.reports_sanction_header_right.description: 'Contenido alineado a la derecha del encabezado, en la misma línea que el izquierdo. Admite marcadores de sustitución (consulta la lista completa con el icono de información).'

settings.key.reports_sanction_header_margin.label: 'Margen para encabezado de sanciones'
settings.key.reports_sanction_header_margin.description: 'Milímetros reservados en la parte superior de cada página para el encabezado; el contenido del informe empieza tras este margen. Auméntalo si el encabezado tiene varias líneas.'

settings.key.reports_sanction_footer.label: 'Pie de contenido de informe de sanciones'
settings.key.reports_sanction_footer.description: 'Texto que se añade al final del contenido del PDF de una sanción, una sola vez (no se repite en cada página). Admite marcadores de sustitución (consulta la lista completa con el icono de información). Si no se personaliza, se usa por defecto «En {city} a {current_day} de {current_month_name} de {current_year}».'

settings.key.reports_draft_watermark_enabled.label: 'Marca de agua de borrador'
settings.key.reports_draft_watermark_enabled.description: 'Muestra una marca de agua diagonal con el texto «BORRADOR» en el PDF de un parte o una sanción mientras no se haya notificado a la familia. Desactivada por defecto.'

settings.key.reports_group_stats_header_left.label: 'Encabezado de estadísticas por grupo (izquierda)'
settings.key.reports_group_stats_header_left.description: 'Contenido alineado a la izquierda del encabezado de cada página del PDF de estadísticas por grupo. Admite marcadores de sustitución (consulta la lista completa con el icono de información).'

settings.key.reports_group_stats_header_right.label: 'Encabezado de estadísticas por grupo (derecha)'
